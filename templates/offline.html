<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tripotay — Ou pa konekte</title>
  {% load static %}
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:24px;">
    <span class="material-icons" style="font-size:64px; color:var(--t-muted); margin-bottom:16px;">wifi_off</span>
    <h1 style="font-size:1.2rem; font-weight:700; margin-bottom:8px;">Ou pa konekte</h1>
    <p style="color:var(--t-muted); font-size:0.9rem; max-width:280px; line-height:1.6;">
      Lè entènèt ou tounen, paj la ap mete ajou otomatikman.
    </p>
    <button onclick="window.location.reload()" class="btn btn-primary" style="margin-top:24px;">
      <span class="material-icons" style="font-size:16px;">refresh</span>
      Eseye ankò
    </button>
  </div>
</body>
</html>
